name: Build & Test

on:
  push:
    branches: [ main, master, develop ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    name: Build Unsigned IPA
    runs-on: macos-15

    steps:
      - uses: actions/checkout@v4

      - name: Select Xcode 16
        run: sudo xcode-select -s /Applications/Xcode_16.app/Contents/Developer

      - name: Install Dependencies
        run: |
          brew install xcodegen

      - name: Generate Xcode Project
        run: xcodegen generate

      - name: Show Build Settings
        run: |
          xcodebuild -project DirXplore.xcodeproj -showBuildSettings -scheme DirXplore 2>&1 | head -50

      - name: Build App (Debug, Simulator)
        run: |
          xcodebuild -project DirXplore.xcodeproj \
            -scheme DirXplore \
            -configuration Debug \
            -destination 'platform=iOS Simulator,name=iPhone 16,OS=18.0' \
            -derivedDataPath Build/DerivedData \
            build-for-testing \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO

      - name: Build Unsigned IPA (Release)
        run: |
          xcodebuild -project DirXplore.xcodeproj \
            -scheme DirXplore \
            -configuration Release \
            -destination 'generic/platform=iOS' \
            -derivedDataPath Build/DerivedData \
            archive \
            -archivePath Build/Archive/DirXplore.xcarchive \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO

      - name: Export Unsigned IPA
        run: |
          mkdir -p Build/IPA
          xcodebuild -exportArchive \
            -archivePath Build/Archive/DirXplore.xcarchive \
            -exportPath Build/IPA \
            -exportOptionsPlist ExportOptions.plist

      - name: Upload IPA
        uses: actions/upload-artifact@v4
        with:
          name: DirXplore-Unsigned
          path: Build/IPA/*.ipa
          retention-days: 30
