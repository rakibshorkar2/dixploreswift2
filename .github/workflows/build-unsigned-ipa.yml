name: Build Unsigned IPA

on:
  push:
    branches: [ main ]
  workflow_dispatch:
    inputs:
      create_release:
        description: 'Create a GitHub Release with the IPA'
        type: boolean
        default: true

permissions:
  contents: write

env:
  PROJECT_DIR: .
  SCHEME: DirXplore
  PROJECT_NAME: DirXplore Pro

jobs:
  build:
    name: Build Unsigned IPA
    runs-on: macos-15
    timeout-minutes: 30

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Diagnostic - OS, Xcode & SDK Info
        run: |
          echo "=== OS Info ==="
          sw_vers
          echo ""
          echo "=== Xcode Versions Available ==="
          ls /Applications/ | grep -i xcode
          echo ""
          echo "=== Selected Xcode ==="
          XCODE_APP=$(ls /Applications/ | grep -i xcode | sort -r | head -1)
          echo "Using: $XCODE_APP"
          sudo xcode-select -s "/Applications/$XCODE_APP/Contents/Developer"
          xcodebuild -version
          echo ""
          echo "=== SDKs Available ==="
          xcodebuild -showsdks
          echo ""
          echo "=== Swift Version ==="
          swift --version
          echo ""
          echo "=== Runner Info ==="
          uname -a

      - name: Install XcodeGen
        run: brew install xcodegen

      - name: Generate Xcode project
        working-directory: ${{ env.PROJECT_DIR }}
        run: xcodegen generate

      - name: Build for generic iOS device
        working-directory: ${{ env.PROJECT_DIR }}
        run: |
          xcodebuild -project "${{ env.PROJECT_NAME }}.xcodeproj" \
            -scheme "${{ env.SCHEME }}" \
            -configuration Release \
            -destination 'generic/platform=iOS' \
            -archivePath "${{ runner.temp }}/${{ env.PROJECT_NAME }}.xcarchive" \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO \
            archive

      - name: Create unsigned IPA
        run: |
          ARCHIVE="${{ runner.temp }}/${{ env.PROJECT_NAME }}.xcarchive"
          APP_PATH=$(find "$ARCHIVE" -name "*.app" -type d -maxdepth 4 | head -1)
          echo "App found at: $APP_PATH"
          if [ -z "$APP_PATH" ]; then
            echo "ERROR: .app not found in archive!"
            find "$ARCHIVE" -maxdepth 5 -type d | head -20
            exit 1
          fi
          mkdir -p "${{ runner.temp }}/Payload"
          cp -R "$APP_PATH" "${{ runner.temp }}/Payload/"
          cd "${{ runner.temp }}"
          zip -qr "${{ env.PROJECT_NAME }}.ipa" Payload/
          echo "IPA created: ${{ runner.temp }}/${{ env.PROJECT_NAME }}.ipa"

      - name: Upload IPA artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ env.PROJECT_NAME }}-unsigned
          path: ${{ runner.temp }}/${{ env.PROJECT_NAME }}.ipa
          retention-days: 7

      - name: Find IPA
        id: find_ipa
        run: |
          IPA=$(find "${{ runner.temp }}" -name "*.ipa" -type f 2>/dev/null | head -1)
          if [ -z "$IPA" ]; then
            # Check in export path
            IPA=$(find "${{ runner.temp }}/${{ env.PROJECT_NAME }}" -name "*.ipa" -type f 2>/dev/null | head -1)
          fi
          echo "ipa_path=$IPA" >> $GITHUB_OUTPUT
          echo "Found IPA: $IPA"

      - name: Create Release and Upload IPA
        if: success() && steps.find_ipa.outputs.ipa_path != ''
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v1.0.${{ github.run_number }}
          name: "DirXplore Pro v1.0.${{ github.run_number }}"
          body: |
            ## DirXplore Pro Unsigned IPA

            ### How to sideload:
            1. Download the IPA from this release
            2. Use **AltStore**, **SideStore**, **TrollStore**, or **Sideloadly** to install on your iPhone
            3. No jailbreak required — works on any unsigned iOS device

            ### Features:
            - Paste & download from any link (Google Drive, Dropbox, Seedr, MEGA, direct links)
            - Background downloads with progress tracking
            - Pause, resume, retry failed downloads
            - iOS-native UI with dark mode support
            - File preview and sharing
          files: ${{ steps.find_ipa.outputs.ipa_path }}
          generate_release_notes: false
