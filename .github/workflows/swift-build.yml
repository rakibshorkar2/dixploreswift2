name: Build Native Swift IPA

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Select Xcode 16
        run: sudo xcode-select -s /Applications/Xcode_16.app/Contents/Developer

      - name: Show Swift version
        run: swift --version

      - name: Resolve SPM dependencies
        run: |
          swift package resolve

      - name: Build for iOS (Release)
        run: |
          xcodebuild -scheme DirXplore \
            -sdk iphoneos18.0 \
            -configuration Release \
            -derivedDataPath build \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_ALLOWED=NO \
            OTHER_SWIFT_FLAGS="-no-verify-emitted-module-interface" \
            build

      - name: Create unsigned IPA
        run: |
          mkdir -p Payload
          cp -r "build/Build/Products/Release-iphoneos/DirXplore.app" Payload/
          zip -r DirXplore.ipa Payload
          rm -rf Payload

      - name: Verify IPA exists
        run: test -f DirXplore.ipa && echo "IPA created successfully"

      - name: Upload IPA
        uses: actions/upload-artifact@v4
        with:
          name: DirXplore-unsigned.ipa
          path: DirXplore.ipa