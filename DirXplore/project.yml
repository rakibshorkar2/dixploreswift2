name: DirXplore
options:
  bundleIdPrefix: com.dirxplore
  deploymentTarget:
    iOS: "17.0"
  xcodeVersion: "15.0"

settings:
  base:
    SWIFT_VERSION: "5.9"
    TARGETED_DEVICE_FAMILY: "1"
    INFOPLIST_FILE: DirXplore/App/Info.plist
    DEVELOPMENT_TEAM: ""

targets:
  DirXplore:
    type: application
    platform: iOS
    sources:
      - path: DirXplore
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.dirxplore.app
        INFOPLIST_FILE: DirXplore/App/Info.plist
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
        CODE_SIGN_STYLE: Automatic
    info:
      path: DirXplore/App/Info.plist
    dependencies:
      - framework: UIKit.framework
      - framework: Foundation.framework
      - framework: UserNotifications.framework
