name: DirXplore Pro
options:
  bundleIdPrefix: com.dirxplore
  deploymentTarget:
    iOS: "18.0"
  xcodeVersion: "16.0"

settings:
  base:
    SWIFT_VERSION: "6"
    TARGETED_DEVICE_FAMILY: "1,2"
    INFOPLIST_FILE: Resources/Info.plist
    PRODUCT_BUNDLE_IDENTIFIER: com.dirxplore
    MARKETING_VERSION: "2.0.0"
    CURRENT_PROJECT_VERSION: "11"
    DEVELOPMENT_TEAM: ""
    CODE_SIGN_STYLE: Automatic
    CODE_SIGN_IDENTITY: Apple Development
    ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
    SUPPORTED_PLATFORMS: "iphoneos iphonesimulator"

packages:
  SwiftSoup:
    url: https://github.com/scinfu/SwiftSoup.git
    from: 2.7.0
  GRDB:
    url: https://github.com/groue/GRDB.swift.git
    from: 6.29.0
  Yams:
    url: https://github.com/jpsim/Yams.git
    from: 5.1.0
  KeychainAccess:
    url: https://github.com/kishikawakatsumi/KeychainAccess.git
    from: 4.2.2

targets:
  DirXplore:
    type: application
    platform: iOS
    sources:
      - path: .
        excludes:
          - "project.yml"
          - "Package.swift"
          - "**/*.md"
          - ".github/"
          - "LiveActivity/"
          - "Widgets/"
          - "Tests/"
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.dirxplore
        INFOPLIST_FILE: Resources/Info.plist
        IPHONEOS_DEPLOYMENT_TARGET: "18.0"
        ENABLE_PREVIEWS: YES
        GENERATE_INFOPLIST_FILE: NO
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        UILaunchStoryboardName: LaunchScreen
        DEVELOPMENT_TEAM: ""
    dependencies:
      - package: SwiftSoup
      - package: GRDB
      - package: Yams
      - package: KeychainAccess
    preBuildScripts:
      - name: "Copy bypassempire.yaml"
        script: |
          if [ -f "${SRCROOT}/Resources/bypassempire.yaml" ]; then
            cp "${SRCROOT}/Resources/bypassempire.yaml" "${TARGET_BUILD_DIR}/${UNLOCALIZED_RESOURCES_FOLDER_PATH}/bypassempire.yaml"
          fi
    info:
      path: Resources/Info.plist
    entitlements:
      path: DirXplore.entitlements

  DirXploreLiveActivity:
    type: app-extension
    platform: iOS
    sources:
      - path: LiveActivity
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.dirxplore.liveactivity
        INFOPLIST_FILE: LiveActivity/Info.plist
        IPHONEOS_DEPLOYMENT_TARGET: "18.0"
    dependencies:
      - target: DirXplore
    info:
      path: LiveActivity/Info.plist
    entitlements:
      path: DirXploreLiveActivity.entitlements

  DirXploreWidget:
    type: app-extension
    platform: iOS
    sources:
      - path: Widgets
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.dirxplore.widget
        INFOPLIST_FILE: Widgets/Info.plist
        IPHONEOS_DEPLOYMENT_TARGET: "18.0"
    dependencies:
      - target: DirXplore
    info:
      path: Widgets/Info.plist

  DirXploreTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - path: Tests
    dependencies:
      - target: DirXplore
